services:
  mediamtx:
    container_name: climbing-live-streaming-mediamtx
    image: bluenviron/mediamtx:1.18.2
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - '1935:1935'     # RTMP ingest
      - '8554:8554'     # RTSP ingest/read
      - '8890:8890/udp' # SRT ingest
      - '8189:8189/udp' # WebRTC ICE/UDP
    expose:
      - '9997'          # API MediaMTX interne uniquement
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  webrtc-hls-gateway:
    container_name: climbing-live-streaming-gateway
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    depends_on:
      mediamtx:
        condition: service_healthy
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/mediamtx/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/mediamtx/server.key:/etc/nginx/certs/server.key:ro
    ports:
      - '8888:8888'   # HLS HTTPS
      - '8889:8889'   # WebRTC HTTPS/WHEP/WHIP
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1:8888/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  ffmpeg-worker:
    container_name: climbing-live-streaming-ffmpeg-worker
    image: jrottenberg/ffmpeg:6.1-alpine
    restart: unless-stopped
    profiles:
      - workers
    depends_on:
      mediamtx:
        condition: service_healthy
    environment:
      - SOURCE_URL=
      - TARGET_URL=
      - VIDEO_CODEC=copy
      - AUDIO_CODEC=aac
    volumes:
      - ./ffmpeg/worker.sh:/work/worker.sh:ro
    entrypoint: ["/bin/sh", "/work/worker.sh"]